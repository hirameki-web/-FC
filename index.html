<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瀬谷フットボールクラブ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Yu Gothic",sans-serif;
    background:#f5f5f0;
}

.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url("soccer.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
}

.hero-content h1{
    font-size:70px;
    color:#ffd22e;
    margin-bottom:20px;
    text-shadow:2px 2px 5px rgba(0,0,0,.5);
}

.hero-content p{
    font-size:24px;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:18px 40px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    margin:10px;
}

.btn-yellow{
    background:#f4b400;
    color:black;
}

.btn-green{
    background:#06c755;
    color:white;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:80px 20px;
}

.section-title{
    text-align:center;
    font-size:42px;
    margin-bottom:50px;
    color:#123d20;
}

.course-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.course-card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.course-header{
    padding:20px;
    color:white;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.green{background:#4caf50;}
.blue{background:#2e5aac;}
.orange{background:#f39c12;}

.course-body{
    padding:30px;
    text-align:center;
}

.price{
    font-size:42px;
    color:#e65100;
    font-weight:bold;
    margin-top:20px;
}

@media(max-width:768px){

.hero-content h1{
    font-size:40px;
}

.course-grid{
    grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<section class="hero">

<div class="hero-content">

<p>サッカーを通じて、考える力と挑戦する心を育てる。</p>

<h1>瀬谷フットボールクラブ</h1>

<p>横浜市瀬谷区の地域密着型サッカースクール</p>

<a href="#contact" class="btn btn-yellow">
無料体験はこちら
</a>

<a href="#" class="btn btn-green">
LINEで相談する
</a>

</div>

</section>

<section class="container">

<h2 class="section-title">
コース・料金
</h2>

<div class="course-grid">

<div class="course-card">
<div class="course-header green">
キッズクラス
</div>

<div class="course-body">
<p>年中〜年長</p>
<p>土曜日 10:00〜11:00</p>

<div class="price">
¥5,000
</div>
</div>
</div>

<div class="course-card">
<div class="course-header blue">
ジュニアクラス
</div>

<div class="course-body">
<p>小学1年〜3年</p>
<p>土曜日 11:00〜12:30</p>

<div class="price">
¥7,000
</div>
</div>
</div>

<div class="course-card">
<div class="course-header orange">
アドバンスクラス
</div>

<div class="course-body">
<p>小学4年〜6年</p>
<p>日曜日 09:00〜11:00</p>

<div class="price">
¥9,000
</div>
</div>
</div>

</div>

</section>

</body>
</html>

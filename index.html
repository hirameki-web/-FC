<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>VERTEX FOOTBALL ACADEMY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
}
header {
    padding: 40px;
    text-align: center;
    background: linear-gradient(90deg, #111, #1a1f2e);
}
h1 {
    font-size: 36px;
    letter-spacing: 2px;
}
.hero {
    padding: 60px 20px;
    text-align: center;
}
.button {
    background: #00c2ff;
    padding: 12px 24px;
    color: black;
    font-weight: bold;
    border-radius: 8px;
    display: inline-block;
    margin-top: 20px;
}
.section {
    padding: 40px 20px;
    max-width: 900px;
    margin: auto;
}
.card {
    background: #151c2c;
    padding: 20px;
    margin: 10px 0;
    border-radius: 10px;
}
footer {
    text-align: center;
    padding: 30px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<header>
    <h1>VERTEX FOOTBALL ACADEMY</h1>
    <p>個の頂点を作る、実戦型フットボールアカデミー</p>
</header>

<div class="hero">
    <h2>試合で“使える個”を育てる</h2>
    <p>技術 × 判断 × 1v1 を徹底強化</p>
    <div class="button">体験トレーニング申込</div>
</div>

<div class="section">
    <h2>特徴</h2>
    <div class="card">少人数制トレーニング（最大16名）</div>
    <div class="card">毎回テーマ固定型トレーニング</div>
    <div class="card">実戦に直結するスキル強化</div>
</div>

<div class="section">
    <h2>料金</h2>
    <div class="card">月4回：8,800円</div>
    <div class="card">月8回：14,800円</div>
</div>

<div class="section">
    <h2>対象</h2>
    <div class="card">小学3年生〜6年生</div>
</div>

<footer>
    © VERTEX FOOTBALL ACADEMY
</footer>

</body>
</html>
